<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JKUpdates.in – Live Updates</title>

<meta name="description" content="Live updates from Kashmir University, JKBOSE, JKSSB">

<style>
body{
  font-family: system-ui;
  max-width:720px;
  margin:auto;
  padding:20px;
  background:#fff;
  color:#111;
  line-height:1.7;
}

header h1{margin:0;}
.sub{color:#666;font-size:14px;}

nav{
  margin:20px 0;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}
nav a{
  cursor:pointer;
  color:#555;
  text-decoration:none;
}
nav a:hover{color:#000;}

.post{
  border-bottom:1px solid #eee;
  padding:15px 0;
  cursor:pointer;
}
.post h2{margin:0;font-size:18px;}
.post p{margin:5px 0;color:#555;font-size:14px;}

.article{display:none;}
.back{cursor:pointer;color:#0077cc;margin-bottom:10px;}

footer{
  margin-top:40px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<header>
  <h1>JKUpdates.in</h1>
  <p class="sub">Live Notifications · KU · JKBOSE · JKSSB</p>
</header>

<nav>
  <a onclick="filterPosts('all')">All</a>
  <a onclick="filterPosts('ku')">KU</a>
  <a onclick="filterPosts('bose')">JKBOSE</a>
  <a onclick="filterPosts('ssb')">JKSSB</a>
</nav>

<div id="list">Loading updates...</div>
<div id="article" class="article"></div>

<footer>
  © 2026 JKUpdates.in
</footer>

<script>
let DB = [];
let currentFilter = 'all';

// 🔥 RSS FEEDS (via rss2json API)
const feeds = [
  {
    url: "https://api.rss2json.com/v1/api.json?rss_url=https://kashmiruniversity.net/notifications.xml",
    cat: "ku"
  },
  {
    url: "https://api.rss2json.com/v1/api.json?rss_url=https://jkbose.nic.in/rss.xml",
    cat: "bose"
  }
];

// FETCH DATA
async function fetchUpdates(){
  DB = [];

  for(const feed of feeds){
    try{
      const res = await fetch(feed.url);
      const data = await res.json();

      data.items.slice(0,5).forEach((item, index)=>{
        DB.push({
          id: Date.now() + Math.random(),
          cat: feed.cat,
          title: item.title,
          excerpt: item.description.replace(/<[^>]+>/g,'').slice(0,100),
          content: item.description,
          link: item.link
        });
      });

    }catch(e){
      console.log("Feed error", e);
    }
  }

  // fallback demo if feeds fail
  if(DB.length === 0){
    DB = [
      {id:1,cat:'ku',title:'KU Update',excerpt:'Latest update...',content:'Demo content'},
      {id:2,cat:'bose',title:'JKBOSE Update',excerpt:'Latest result...',content:'Demo content'},
      {id:3,cat:'ssb',title:'JKSSB Jobs',excerpt:'Recruitment open...',content:'Demo content'}
    ];
  }

  renderPosts();
}

// RENDER POSTS
function renderPosts(){
  const list = document.getElementById('list');
  const data = currentFilter==='all'?DB:DB.filter(p=>p.cat===currentFilter);

  list.innerHTML = data.map(p=>`
    <div class="post" onclick="openPost('${p.id}')">
      <h2>${p.title}</h2>
      <p>${p.excerpt}</p>
    </div>
  `).join('');
}

// FILTER
function filterPosts(cat){
  currentFilter = cat;
  document.getElementById('article').style.display='none';
  document.getElementById('list').style.display='block';
  renderPosts();
}

// OPEN ARTICLE
function openPost(id){
  const p = DB.find(x=>x.id==id);
  const article = document.getElementById('article');

  article.innerHTML = `
    <div class="back" onclick="goBack()">← Back</div>
    <h2>${p.title}</h2>
    <p>${p.content}</p>
    ${p.link ? `<p><a href="${p.link}" target="_blank">Read official source →</a></p>`:''}
  `;

  document.getElementById('list').style.display='none';
  article.style.display='block';
}

// BACK
function goBack(){
  document.getElementById('article').style.display='none';
  document.getElementById('list').style.display='block';
}

// AUTO REFRESH EVERY 10 MIN
setInterval(fetchUpdates, 10*60*1000);

// INIT
fetchUpdates();
</script>

</body>
</html>
